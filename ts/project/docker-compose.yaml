
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_prod_data:/qdrant/storage
    restart: always

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_prod_data:/root/.ollama
    restart: always
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - ollama
    environment:
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_COLLECTION_NAME=profiles
      - VECTOR_SIZE=312
      - MODEL_NAME=gemma4:e4b
      - VECTORIZER_MODEL_NAME=cointegrated/rubert-tiny2
    restart: always

volumes:
  qdrant_prod_data:
  ollama_prod_data: